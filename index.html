<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Estacion Meteorologica</title>
<style>
* { -webkit-box-sizing: border-box; box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, Helvetica, Arial, sans-serif;
  background: #0a0f1e;
  color: #e8eaf0;
  min-height: 100%;
  padding: 0;
}

.header {
  background: #111827;
  border-bottom: 1px solid #1e2a3a;
  padding: 12px 16px;
  text-align: center;
}

.header h1 {
  font-size: 16px;
  font-weight: 600;
  color: #7eb8f7;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.header .update-time {
  font-size: 11px;
  color: #6b7280;
  margin-top: 2px;
}

.location-tabs {
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  background: #111827;
  border-bottom: 1px solid #1e2a3a;
}

.tab-btn {
  -webkit-flex: 1;
  flex: 1;
  padding: 10px 8px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: #6b7280;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
}

.tab-btn.active {
  color: #7eb8f7;
  border-bottom-color: #7eb8f7;
}

.content {
  padding: 12px;
}

.section {
  display: none;
}

.section.active {
  display: block;
}

.main-temp-card {
  background: #111827;
  border: 1px solid #1e2a3a;
  border-radius: 12px;
  padding: 16px;
  text-align: center;
  margin-bottom: 12px;
}

.main-temp {
  font-size: 72px;
  font-weight: 200;
  color: #ffffff;
  line-height: 1;
}

.main-temp sup {
  font-size: 28px;
  font-weight: 300;
  vertical-align: super;
  color: #9ca3af;
}

.weather-desc {
  font-size: 16px;
  color: #9ca3af;
  margin-top: 6px;
}

.feels-like {
  font-size: 13px;
  color: #6b7280;
  margin-top: 4px;
}

.frost-alert {
  background: #1a1040;
  border: 1px solid #5b21b6;
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 12px;
  display: none;
}

.frost-alert.show {
  display: block;
}

.frost-alert .frost-title {
  font-size: 13px;
  font-weight: 600;
  color: #a78bfa;
  margin-bottom: 2px;
}

.frost-alert .frost-text {
  font-size: 12px;
  color: #7c3aed;
  color: #c4b5fd;
}

.grid-2 {
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-flex-wrap: wrap;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 12px;
}

.mini-card {
  background: #111827;
  border: 1px solid #1e2a3a;
  border-radius: 10px;
  padding: 12px;
  -webkit-flex: 1 1 calc(50% - 5px);
  flex: 1 1 calc(50% - 5px);
  min-width: calc(50% - 5px);
}

.mini-card .card-label {
  font-size: 11px;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

.mini-card .card-value {
  font-size: 22px;
  font-weight: 500;
  color: #e8eaf0;
}

.mini-card .card-unit {
  font-size: 12px;
  color: #9ca3af;
}

.mini-card .card-sub {
  font-size: 11px;
  color: #6b7280;
  margin-top: 2px;
}

.sun-card {
  background: #111827;
  border: 1px solid #1e2a3a;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 12px;
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-justify-content: space-around;
  justify-content: space-around;
  text-align: center;
}

.sun-item .sun-label {
  font-size: 11px;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.sun-item .sun-icon {
  font-size: 22px;
  margin: 4px 0;
}

.sun-item .sun-time {
  font-size: 18px;
  font-weight: 500;
  color: #fbbf24;
}

.section-title {
  font-size: 12px;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 8px;
  margin-top: 4px;
}

.forecast-list {
  background: #111827;
  border: 1px solid #1e2a3a;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 12px;
}

.forecast-row {
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid #1a2030;
}

.forecast-row:last-child {
  border-bottom: none;
}

.forecast-day {
  width: 90px;
  font-size: 13px;
  color: #d1d5db;
  font-weight: 500;
}

.forecast-desc {
  -webkit-flex: 1;
  flex: 1;
  font-size: 12px;
  color: #9ca3af;
}

.forecast-rain {
  width: 46px;
  font-size: 12px;
  color: #60a5fa;
  text-align: center;
}

.forecast-temps {
  text-align: right;
  width: 70px;
}

.forecast-max {
  font-size: 15px;
  font-weight: 500;
  color: #f97316;
}

.forecast-min {
  font-size: 13px;
  color: #60a5fa;
}

.frost-flag {
  font-size: 10px;
  color: #a78bfa;
  font-weight: 600;
}

.rain-history {
  background: #111827;
  border: 1px solid #1e2a3a;
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 12px;
}

.rain-row {
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  padding: 5px 0;
  border-bottom: 1px solid #1a2030;
}

.rain-row:last-child { border-bottom: none; }

.rain-period {
  width: 130px;
  font-size: 12px;
  color: #9ca3af;
}

.rain-bar-wrap {
  -webkit-flex: 1;
  flex: 1;
  background: #0d1526;
  border-radius: 4px;
  height: 8px;
  margin: 0 10px;
  overflow: hidden;
}

.rain-bar {
  height: 100%;
  background: #2563eb;
  border-radius: 4px;
  -webkit-transition: width 0.8s ease;
  transition: width 0.8s ease;
}

.rain-mm {
  font-size: 13px;
  font-weight: 500;
  color: #60a5fa;
  width: 52px;
  text-align: right;
}

.error-msg {
  text-align: center;
  padding: 20px;
  color: #ef4444;
  font-size: 14px;
}

.loading {
  text-align: center;
  padding: 40px 20px;
  color: #6b7280;
  font-size: 14px;
}

.loading-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: #6b7280;
  border-radius: 50%;
  margin: 0 3px;
  -webkit-animation: blink 1.2s infinite;
  animation: blink 1.2s infinite;
}
.loading-dot:nth-child(2) { -webkit-animation-delay: 0.2s; animation-delay: 0.2s; }
.loading-dot:nth-child(3) { -webkit-animation-delay: 0.4s; animation-delay: 0.4s; }

@-webkit-keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
@keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

.refresh-btn {
  display: block;
  margin: 0 auto 16px;
  padding: 8px 24px;
  background: none;
  border: 1px solid #1e2a3a;
  border-radius: 20px;
  color: #7eb8f7;
  font-size: 13px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.temp-color-hot { color: #f97316; }
.temp-color-warm { color: #fbbf24; }
.temp-color-mild { color: #34d399; }
.temp-color-cold { color: #60a5fa; }
.temp-color-freeze { color: #a78bfa; }

.wind-dir { font-size: 11px; color: #9ca3af; }
</style>
</head>
<body>

<div class="header">
  <h1>Estacion Meteorologica</h1>
  <div class="update-time" id="last-update">Cargando...</div>
</div>

<div class="location-tabs">
  <button class="tab-btn active" onclick="switchTab(0)">Tristan Suarez</button>
  <button class="tab-btn" onclick="switchTab(1)">Capital Federal</button>
</div>

<div class="content">
  <div id="section-0" class="section active">
    <div id="loading-0" class="loading">
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
    </div>
    <div id="data-0" style="display:none"></div>
    <div id="error-0" class="error-msg" style="display:none"></div>
  </div>
  <div id="section-1" class="section">
    <div id="loading-1" class="loading">
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
    </div>
    <div id="data-1" style="display:none"></div>
    <div id="error-1" class="error-msg" style="display:none"></div>
  </div>
</div>

<script>
var LOCATIONS = [
  { name: "Tristan Suarez", lat: -34.89, lon: -58.57 },
  { name: "Capital Federal", lat: -34.6037, lon: -58.3816 }
];

var loaded = [false, false];
var dataCache = [null, null];
var currentTab = 0;

var WMO_CODES = {
  0: "Cielo despejado", 1: "Mayormente despejado", 2: "Parcialmente nublado", 3: "Nublado",
  45: "Niebla", 48: "Niebla con escarcha",
  51: "Llovizna leve", 53: "Llovizna moderada", 55: "Llovizna intensa",
  61: "Lluvia leve", 63: "Lluvia moderada", 65: "Lluvia intensa",
  71: "Nevada leve", 73: "Nevada moderada", 75: "Nevada intensa", 77: "Granizo",
  80: "Chaparrones leves", 81: "Chaparrones moderados", 82: "Chaparrones fuertes",
  85: "Chubascos de nieve", 86: "Chubascos de nieve fuertes",
  95: "Tormenta", 96: "Tormenta con granizo", 99: "Tormenta fuerte con granizo"
};

var DIAS = ["Dom","Lun","Mar","Mie","Jue","Vie","Sab"];
var MESES = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

function pad(n) { return n < 10 ? "0" + n : "" + n; }

function formatTime(isoStr) {
  var d = new Date(isoStr);
  return pad(d.getHours()) + ":" + pad(d.getMinutes());
}

function getDayLabel(isoStr, index) {
  var d = new Date(isoStr);
  if (index === 0) return "Hoy";
  if (index === 1) return "Manana";
  return DIAS[d.getDay()] + " " + d.getDate() + "/" + pad(d.getMonth()+1);
}

function tempClass(t) {
  if (t >= 32) return "temp-color-hot";
  if (t >= 25) return "temp-color-warm";
  if (t >= 15) return "temp-color-mild";
  if (t >= 5) return "temp-color-cold";
  return "temp-color-freeze";
}

function windDir(deg) {
  var dirs = ["N","NE","E","SE","S","SO","O","NO"];
  return dirs[Math.round(deg/45) % 8];
}

function switchTab(idx) {
  var tabs = document.querySelectorAll(".tab-btn");
  var sections = document.querySelectorAll(".section");
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].className = i === idx ? "tab-btn active" : "tab-btn";
    sections[i].className = i === idx ? "section active" : "section";
  }
  currentTab = idx;
  if (!loaded[idx]) {
    fetchWeather(idx);
  }
}

function fetchWeather(idx) {
  var loc = LOCATIONS[idx];
  var url = "https://api.open-meteo.com/v1/forecast"
    + "?latitude=" + loc.lat
    + "&longitude=" + loc.lon
    + "&current=temperature_2m,apparent_temperature,relative_humidity_2m,precipitation,rain,weather_code,wind_speed_10m,wind_direction_10m,surface_pressure"
    + "&hourly=temperature_2m,precipitation_probability,precipitation"
    + "&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_sum,precipitation_probability_max"
    + "&timezone=America%2FArgentina%2FBuenos_Aires"
    + "&forecast_days=7"
    + "&past_days=3";

  var xhr = new XMLHttpRequest();
  xhr.open("GET", url, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      if (xhr.status === 200) {
        try {
          var data = JSON.parse(xhr.responseText);
          dataCache[idx] = data;
          loaded[idx] = true;
          renderWeather(idx, data);
        } catch(e) {
          showError(idx, "Error al procesar datos.");
        }
      } else {
        showError(idx, "No se pudo conectar a la API. Verifique su conexion a internet.");
      }
    }
  };
  xhr.send();
}

function showError(idx, msg) {
  document.getElementById("loading-" + idx).style.display = "none";
  document.getElementById("error-" + idx).style.display = "block";
  document.getElementById("error-" + idx).innerHTML = msg + '<br><br><button class="refresh-btn" onclick="retryLoad(' + idx + ')">Reintentar</button>';
}

function retryLoad(idx) {
  loaded[idx] = false;
  document.getElementById("error-" + idx).style.display = "none";
  document.getElementById("loading-" + idx).style.display = "block";
  fetchWeather(idx);
}

function renderWeather(idx, data) {
  document.getElementById("loading-" + idx).style.display = "none";

  var c = data.current;
  var daily = data.daily;
  var loc = LOCATIONS[idx];

  var temp = Math.round(c.temperature_2m);
  var feels = Math.round(c.apparent_temperature);
  var wcode = c.weather_code;
  var desc = WMO_CODES[wcode] || "Desconocido";
  var hum = Math.round(c.relative_humidity_2m);
  var wind = Math.round(c.wind_speed_10m);
  var wdir = windDir(c.wind_direction_10m);
  var precip = c.precipitation || 0;
  var pressure = Math.round(c.surface_pressure);

  var sunrise0 = daily.sunrise[3];
  var sunset0 = daily.sunset[3];

  var minTemp = Math.min.apply(null, daily.temperature_2m_min.slice(3, 10));
  var hasFrost = false;
  var frostDays = [];
  for (var i = 3; i < daily.temperature_2m_min.length; i++) {
    if (daily.temperature_2m_min[i] <= 0) {
      hasFrost = true;
      var label = getDayLabel(daily.time[i], i - 3);
      frostDays.push(label + " (" + daily.temperature_2m_min[i] + "°C)");
    }
  }

  var rain7 = 0;
  for (var j = 3; j < daily.precipitation_sum.length; j++) {
    rain7 += (daily.precipitation_sum[j] || 0);
  }
  var rain3 = 0;
  for (var k = 0; k < 3; k++) {
    rain3 += (daily.precipitation_sum[k] || 0);
  }
  var rainToday = daily.precipitation_sum[3] || 0;
  var rainYest = daily.precipitation_sum[2] || 0;

  var maxRain = Math.max(rain7, rain3, rainToday, rainYest, 1);

  var frostHtml = "";
  if (hasFrost) {
    frostHtml = '<div class="frost-alert show">'
      + '<div class="frost-title">&#x26A0; Alerta de Helada</div>'
      + '<div class="frost-text">Temperaturas bajo cero esperadas: ' + frostDays.join(", ") + '</div>'
      + '</div>';
  }

  var forecastHtml = "";
  for (var d = 3; d < Math.min(daily.time.length, 10); d++) {
    var dayLabel = getDayLabel(daily.time[d], d - 3);
    var dMax = Math.round(daily.temperature_2m_max[d]);
    var dMin = Math.round(daily.temperature_2m_min[d]);
    var dDesc = WMO_CODES[daily.weather_code[d]] || "";
    var dRain = daily.precipitation_sum[d] || 0;
    var dRainProb = daily.precipitation_probability_max[d] || 0;
    var frostFlag = dMin <= 0 ? '<span class="frost-flag"> HELADA</span>' : "";
    forecastHtml += '<div class="forecast-row">'
      + '<div class="forecast-day">' + dayLabel + '</div>'
      + '<div class="forecast-desc">' + dDesc + frostFlag + '</div>'
      + '<div class="forecast-rain"><span style="color:#60a5fa">' + dRain.toFixed(1) + 'mm</span><br><span style="font-size:10px;color:#4b5563">' + dRainProb + '%</span></div>'
      + '<div class="forecast-temps">'
      + '<span class="forecast-max ' + tempClass(dMax) + '">' + dMax + '°</span>'
      + ' / '
      + '<span class="forecast-min">' + dMin + '°</span>'
      + '</div>'
      + '</div>';
  }

  var html = '<div class="main-temp-card">'
    + '<div class="main-temp ' + tempClass(temp) + '">' + temp + '<sup>°C</sup></div>'
    + '<div class="weather-desc">' + desc + '</div>'
    + '<div class="feels-like">Sensacion termica: ' + feels + '°C</div>'
    + '</div>'

    + frostHtml

    + '<div class="sun-card">'
    + '<div class="sun-item">'
    + '<div class="sun-label">Salida del sol</div>'
    + '<div class="sun-icon">&#9728;</div>'
    + '<div class="sun-time">' + formatTime(sunrise0) + '</div>'
    + '</div>'
    + '<div class="sun-item">'
    + '<div class="sun-label">Puesta del sol</div>'
    + '<div class="sun-icon">&#9790;</div>'
    + '<div class="sun-time">' + formatTime(sunset0) + '</div>'
    + '</div>'
    + '</div>'

    + '<div class="grid-2">'
    + '<div class="mini-card">'
    + '<div class="card-label">Humedad</div>'
    + '<div class="card-value">' + hum + '<span class="card-unit">%</span></div>'
    + '</div>'
    + '<div class="mini-card">'
    + '<div class="card-label">Viento</div>'
    + '<div class="card-value">' + wind + '<span class="card-unit"> km/h</span></div>'
    + '<div class="card-sub wind-dir">' + wdir + '</div>'
    + '</div>'
    + '<div class="mini-card">'
    + '<div class="card-label">Presion</div>'
    + '<div class="card-value">' + pressure + '<span class="card-unit"> hPa</span></div>'
    + '</div>'
    + '<div class="mini-card">'
    + '<div class="card-label">Lluvia hoy</div>'
    + '<div class="card-value">' + rainToday.toFixed(1) + '<span class="card-unit"> mm</span></div>'
    + '</div>'
    + '</div>'

    + '<div class="section-title">Lluvia acumulada</div>'
    + '<div class="rain-history">'
    + '<div class="rain-row">'
    + '<div class="rain-period">Hoy</div>'
    + '<div class="rain-bar-wrap"><div class="rain-bar" style="width:' + Math.round(rainToday/maxRain*100) + '%"></div></div>'
    + '<div class="rain-mm">' + rainToday.toFixed(1) + ' mm</div>'
    + '</div>'
    + '<div class="rain-row">'
    + '<div class="rain-period">Ayer</div>'
    + '<div class="rain-bar-wrap"><div class="rain-bar" style="width:' + Math.round(rainYest/maxRain*100) + '%"></div></div>'
    + '<div class="rain-mm">' + rainYest.toFixed(1) + ' mm</div>'
    + '</div>'
    + '<div class="rain-row">'
    + '<div class="rain-period">Ultimos 3 dias</div>'
    + '<div class="rain-bar-wrap"><div class="rain-bar" style="width:' + Math.round(rain3/maxRain*100) + '%"></div></div>'
    + '<div class="rain-mm">' + rain3.toFixed(1) + ' mm</div>'
    + '</div>'
    + '<div class="rain-row">'
    + '<div class="rain-period">Proximos 7 dias</div>'
    + '<div class="rain-bar-wrap"><div class="rain-bar" style="width:' + Math.round(rain7/maxRain*100) + '%"></div></div>'
    + '<div class="rain-mm">' + rain7.toFixed(1) + ' mm</div>'
    + '</div>'
    + '</div>'

    + '<div class="section-title">Pronostico 7 dias</div>'
    + '<div class="forecast-list">' + forecastHtml + '</div>'

    + '<button class="refresh-btn" onclick="refreshData(' + idx + ')">&#8635; Actualizar datos</button>';

  var container = document.getElementById("data-" + idx);
  container.innerHTML = html;
  container.style.display = "block";

  var now = new Date();
  document.getElementById("last-update").innerHTML =
    "Actualizado: " + pad(now.getHours()) + ":" + pad(now.getMinutes()) + " hs";
}

function refreshData(idx) {
  var container = document.getElementById("data-" + idx);
  container.style.display = "none";
  document.getElementById("loading-" + idx).style.display = "block";
  loaded[idx] = false;
  fetchWeather(idx);
}

fetchWeather(0);

setInterval(function() {
  if (loaded[0]) refreshData(0);
  if (loaded[1]) refreshData(1);
}, 30 * 60 * 1000);
</script>
</body>
</html>
