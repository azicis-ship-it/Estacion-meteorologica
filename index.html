<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Estación Meteorológica Pro</title>
<style>
:root {
  --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  --card-bg: rgba(30, 41, 59, 0.7);
  --border-color: rgba(255, 255, 255, 0.1);
  --accent-blue: #38bdf8;
  --text-main: #f8fafc;
  --text-dim: #94a3b8;
}

* { -webkit-box-sizing: border-box; box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg-gradient);
  background-attachment: fixed;
  color: var(--text-main);
  min-height: 100vh;
  padding-bottom: 30px;
}

.header { padding: 24px 16px 12px; text-align: center; }
.header h1 { font-size: 20px; font-weight: 700; }
.header .update-time { font-size: 11px; color: var(--accent-blue); margin-top: 4px; }

.location-tabs { display: flex; background: rgba(15, 23, 42, 0.5); margin: 10px 16px; padding: 4px; border-radius: 12px; border: 1px solid var(--border-color); }
.tab-btn { flex: 1; padding: 10px; background: none; border: none; border-radius: 8px; color: var(--text-dim); font-size: 13px; font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.tab-btn.active { background: var(--accent-blue); color: #0f172a; }

.content { padding: 0 16px; }
.section { display: none; }
.section.active { display: block; }

.card { background: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--border-color); border-radius: 20px; padding: 20px; margin-bottom: 16px; }
.main-temp-card { text-align: center; padding: 10px 0; background: none; border: none; }
.main-icon { font-size: 52px; margin-bottom: 5px; display: block; }
.main-temp { font-size: 80px; font-weight: 800; line-height: 1; }
.main-temp sup { font-size: 30px; color: var(--accent-blue); vertical-align: super; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.mini-card { background: var(--card-bg); padding: 16px; border-radius: 18px; border: 1px solid var(--border-color); }
.card-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 6px; letter-spacing: 0.5px; }
.card-value { font-size: 19px; font-weight: 600; }

.section-title { font-size: 11px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin: 20px 0 10px 4px; letter-spacing: 1px; }

.rain-row { display: flex; align-items: center; margin-bottom: 12px; }
.rain-row:last-child { margin-bottom: 0; }
.rain-label { width: 85px; font-size: 13px; color: var(--text-dim); }
.rain-bar-wrap { flex: 1; background: rgba(255,255,255,0.05); height: 8px; border-radius: 10px; margin: 0 12px; overflow: hidden; }
.rain-bar { height: 100%; background: var(--accent-blue); border-radius: 10px; transition: width 1s ease; box-shadow: 0 0 8px rgba(56, 189, 248, 0.4); }
.rain-mm-val { width: 55px; text-align: right; font-size: 13px; font-weight: 700; color: var(--accent-blue); }

.forecast-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.forecast-row:last-child { border-bottom: none; }
.forecast-day { width: 70px; font-weight: 600; font-size: 14px; }
.forecast-icon { width: 30px; font-size: 18px; text-align: center; margin-right: 10px; }
.forecast-rain-mm { flex: 1; font-size: 12px; color: #60a5fa; font-weight: 600; }
.forecast-temps { text-align: right; font-weight: 700; }

.temp-hot { color: #f87171; }
.temp-warm { color: #fbbf24; }
.temp-mild { color: #34d399; }
.temp-cold { color: #38bdf8; }

.refresh-btn { width: 100%; padding: 16px; border-radius: 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--text-main); font-weight: 700; margin-top: 10px; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <h1>Estación Meteorológica</h1>
  <div class="update-time" id="last-update">Sincronizando...</div>
</div>

<div class="location-tabs">
  <button class="tab-btn active" onclick="switchTab(0)">Tristán Suárez</button>
  <button class="tab-btn" onclick="switchTab(1)">Capital Federal</button>
</div>

<div class="content">
  <div id="section-0" class="section active"><div id="data-0"></div></div>
  <div id="section-1" class="section"><div id="data-1"></div></div>
</div>

<script>
var LOCATIONS = [
  { name: "Tristán Suárez", lat: -34.89, lon: -58.57 },
  { name: "Capital Federal", lat: -34.6037, lon: -58.3816 }
];

var WEATHER_MAP = {
  0: { txt: "Despejado", icon: "☀️" }, 1: { txt: "M. Despejado", icon: "🌤️" },
  2: { txt: "P. Nublado", icon: "⛅" }, 3: { txt: "Nublado", icon: "☁️" },
  45: { txt: "Niebla", icon: "🌫️" }, 51: { txt: "Llovizna", icon: "🌦️" },
  61: { txt: "Lluvia Leve", icon: "💧" }, 63: { txt: "Lluvia", icon: "🌧️" },
  80: { txt: "Chaparrones", icon: "🌦️" }, 95: { txt: "Tormenta", icon: "⛈️" }
};

function getInfo(code) { return WEATHER_MAP[code] || { txt: "Estable", icon: "✨" }; }
function getTempClass(t) { return t >= 30 ? "temp-hot" : t >= 22 ? "temp-warm" : t >= 14 ? "temp-mild" : "temp-cold"; }

function fetchWeather(idx) {
  var loc = LOCATIONS[idx];
  // Solicitamos 1 día pasado para obtener "Ayer"
  var url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=America%2FArgentina%2FBuenos_Aires&forecast_days=7&past_days=1`;

  fetch(url).then(res => res.json()).then(data => {
    renderWeather(idx, data);
  });
}

function renderWeather(idx, data) {
  var c = data.current;
  var d = data.daily;
  var currentInfo = getInfo(c.weather_code);

  // Lógica de Lluvia: d.precipitation_sum[0] es AYER, [1] es HOY
  var rainAyer = d.precipitation_sum[0] || 0;
  var rainHoy = d.precipitation_sum[1] || 0;
  var rainSemana = d.precipitation_sum.slice(1, 8).reduce((a, b) => a + b, 0); // Hoy + 6 días próx.
  var maxVisual = Math.max(rainSemana, 10); // Para escala de barras

  var html = `
    <div class="main-temp-card">
      <span class="main-icon">${currentInfo.icon}</span>
      <div class="main-temp ${getTempClass(c.temperature_2m)}">${Math.round(c.temperature_2m)}<sup>°C</sup></div>
      <div style="font-size:18px; font-weight:600; margin-top:5px;">${currentInfo.txt}</div>
      <div style="color:var(--text-dim); font-size:13px;">Sensación: ${Math.round(c.apparent_temperature)}°C</div>
    </div>

    <div class="grid-2">
      <div class="mini-card"><div class="card-label">Humedad</div><div class="card-value">${Math.round(c.relative_humidity_2m)}%</div></div>
      <div class="mini-card"><div class="card-label">Viento</div><div class="card-value">${Math.round(c.wind_speed_10m)} <span style="font-size:12px">km/h</span></div></div>
    </div>

    <div class="section-title">Lluvia Acumulada</div>
    <div class="card">
      ${renderRainRow("Ayer", rainAyer, maxVisual)}
      ${renderRainRow("Hoy", rainHoy, maxVisual)}
      ${renderRainRow("Semana", rainSemana, maxVisual)}
    </div>

    <div class="section-title">Pronóstico y Proximos mm</div>
    <div class="card">
      ${d.time.slice(1, 8).map((t, i) => {
        var dayInfo = getInfo(d.weather_code[i+1]);
        var rainDay = d.precipitation_sum[i+1] || 0;
        return `
        <div class="forecast-row">
          <div class="forecast-day">${i===0?'Hoy':i===1?'Mañana':new Date(t + 'T00:00:00').toLocaleDateString('es-AR',{weekday:'short'})}</div>
          <span class="forecast-icon">${dayInfo.icon}</span>
          <div class="forecast-rain-mm">${rainDay > 0 ? rainDay.toFixed(1) + ' mm' : ''}</div>
          <div class="forecast-temps">
            <span class="${getTempClass(d.temperature_2m_max[i+1])}">${Math.round(d.temperature_2m_max[i+1])}°</span>
            <span style="color:var(--text-dim); font-size:12px; margin-left:8px;">${Math.round(d.temperature_2m_min[i+1])}°</span>
          </div>
        </div>`;
      }).join('')}
    </div>
    <button class="refresh-btn" onclick="fetchWeather(${idx})">🔄 Actualizar</button>
  `;

  document.getElementById("data-" + idx).innerHTML = html;
  document.getElementById("last-update").innerHTML = "Sincronizado: " + new Date().toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'}) + " hs";
}

function renderRainRow(label, val, max) {
  var perc = Math.min((val / max) * 100, 100);
  return `
    <div class="rain-row">
      <div class="rain-label">${label}</div>
      <div class="rain-bar-wrap"><div class="rain-bar" style="width:${perc}%"></div></div>
      <div class="rain-mm-val">${val.toFixed(1)}<span style="font-size:10px">mm</span></div>
    </div>`;
}

function switchTab(idx) {
  document.querySelectorAll(".tab-btn").forEach((b, i) => b.className = i===idx ? "tab-btn active" : "tab-btn");
  document.querySelectorAll(".section").forEach((s, i) => s.className = i===idx ? "section active" : "section");
  fetchWeather(idx);
}

fetchWeather(0);
</script>
</body>
</html>
