<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Estacion Meteorologica</title>
<style>
* { -webkit-box-sizing: border-box; box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, Helvetica, Arial, sans-serif; background: #07101f; color: #e8eaf0; }

.header { background: #0d1828; border-bottom: 1px solid #1a2640; padding: 10px 16px; display: -webkit-box; display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; -webkit-justify-content: space-between; justify-content: space-between; }
.header h1 { font-size: 14px; font-weight: 600; color: #7eb8f7; letter-spacing: 1.5px; text-transform: uppercase; }
.header .update-time { font-size: 11px; color: #4b5f7a; }

.location-tabs { display: -webkit-box; display: -webkit-flex; display: flex; background: #0d1828; border-bottom: 1px solid #1a2640; }
.tab-btn { -webkit-flex: 1; flex: 1; padding: 11px 8px; background: none; border: none; border-bottom: 2px solid transparent; color: #4b5f7a; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; -webkit-tap-highlight-color: transparent; letter-spacing: 0.3px; }
.tab-btn.active { color: #7eb8f7; border-bottom-color: #3b82f6; }

.content { padding: 12px; }
.section { display: none; }
.section.active { display: block; }

.main-card { background: #0d1828; border: 1px solid #1a2640; border-radius: 16px; padding: 20px 16px 16px; margin-bottom: 12px; text-align: center; }
.main-card .weather-icon-wrap { margin-bottom: 8px; }
.main-card .weather-icon-wrap svg { width: 80px; height: 80px; }
.main-temp { font-size: 68px; font-weight: 200; line-height: 1; }
.main-temp sup { font-size: 26px; font-weight: 300; vertical-align: super; color: #9ca3af; }
.weather-desc { font-size: 15px; color: #9ca3af; margin-top: 6px; font-weight: 500; }
.feels-row { font-size: 12px; color: #4b5f7a; margin-top: 5px; }
.minmax-row { font-size: 14px; margin-top: 8px; }
.minmax-row .mx { color: #f97316; font-weight: 600; }
.minmax-row .mn { color: #60a5fa; font-weight: 600; }

.frost-alert { background: #160d2e; border: 1px solid #6d28d9; border-radius: 10px; padding: 10px 14px; margin-bottom: 12px; display: none; }
.frost-alert.show { display: -webkit-box; display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; gap: 10px; }
.frost-alert svg { width: 32px; height: 32px; -webkit-flex-shrink: 0; flex-shrink: 0; }
.frost-alert .frost-title { font-size: 13px; font-weight: 700; color: #c4b5fd; }
.frost-alert .frost-text { font-size: 11px; color: #a78bfa; margin-top: 2px; }

.sun-card { background: #0d1828; border: 1px solid #1a2640; border-radius: 12px; padding: 14px 10px; margin-bottom: 12px; display: -webkit-box; display: -webkit-flex; display: flex; }
.sun-item { -webkit-flex: 1; flex: 1; text-align: center; }
.sun-divider { width: 1px; background: #1a2640; margin: 4px 0; }
.sun-label { font-size: 10px; color: #4b5f7a; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.sun-item svg { width: 36px; height: 36px; margin-bottom: 6px; }
.sun-time { font-size: 20px; font-weight: 500; color: #fbbf24; }

.grid-4 { display: -webkit-box; display: -webkit-flex; display: flex; -webkit-flex-wrap: wrap; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.mini-card { background: #0d1828; border: 1px solid #1a2640; border-radius: 12px; padding: 12px 10px; -webkit-flex: 1 1 calc(50% - 4px); flex: 1 1 calc(50% - 4px); min-width: calc(50% - 4px); display: -webkit-box; display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; gap: 10px; }
.mini-card svg { width: 34px; height: 34px; -webkit-flex-shrink: 0; flex-shrink: 0; }
.mini-card-text .card-label { font-size: 10px; color: #4b5f7a; text-transform: uppercase; letter-spacing: 0.4px; }
.mini-card-text .card-value { font-size: 20px; font-weight: 500; color: #e8eaf0; line-height: 1.2; }
.mini-card-text .card-unit { font-size: 11px; color: #6b7280; }
.mini-card-text .card-sub { font-size: 11px; color: #6b7280; }

.section-title { font-size: 11px; color: #4b5f7a; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; margin-top: 2px; padding-left: 2px; }

.rain-card { background: #0d1828; border: 1px solid #1a2640; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
.rain-row { display: -webkit-box; display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; padding: 6px 0; border-bottom: 1px solid #111e30; }
.rain-row:last-child { border-bottom: none; }
.rain-icon { width: 24px; -webkit-flex-shrink: 0; flex-shrink: 0; }
.rain-icon svg { width: 20px; height: 20px; }
.rain-period { width: 118px; font-size: 12px; color: #9ca3af; padding-left: 4px; }
.rain-bar-wrap { -webkit-flex: 1; flex: 1; background: #0a1525; border-radius: 4px; height: 7px; margin: 0 8px; overflow: hidden; }
.rain-bar { height: 100%; background: #2563eb; border-radius: 4px; }
.rain-mm { font-size: 13px; font-weight: 600; color: #60a5fa; width: 50px; text-align: right; }

.forecast-card { background: #0d1828; border: 1px solid #1a2640; border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
.forecast-row { display: -webkit-box; display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; padding: 10px 14px; border-bottom: 1px solid #111e30; gap: 8px; }
.forecast-row:last-child { border-bottom: none; }
.forecast-icon { width: 34px; -webkit-flex-shrink: 0; flex-shrink: 0; }
.forecast-icon svg { width: 30px; height: 30px; }
.forecast-day { width: 80px; font-size: 13px; color: #d1d5db; font-weight: 600; -webkit-flex-shrink: 0; flex-shrink: 0; }
.forecast-info { -webkit-flex: 1; flex: 1; }
.forecast-desc-text { font-size: 11px; color: #6b7280; }
.forecast-rain-info { font-size: 11px; color: #60a5fa; margin-top: 1px; }
.forecast-temps { text-align: right; -webkit-flex-shrink: 0; flex-shrink: 0; }
.f-max { font-size: 16px; font-weight: 600; }
.f-min { font-size: 13px; color: #60a5fa; }
.frost-tag { font-size: 9px; color: #a78bfa; font-weight: 700; background: #1e0f4a; border-radius: 3px; padding: 1px 4px; display: inline-block; margin-top: 2px; }

.loading { text-align: center; padding: 50px 20px; color: #4b5f7a; }
.loading-dot { display: inline-block; width: 7px; height: 7px; background: #4b5f7a; border-radius: 50%; margin: 0 3px; -webkit-animation: blink 1.2s infinite; animation: blink 1.2s infinite; }
.loading-dot:nth-child(2) { -webkit-animation-delay: 0.2s; animation-delay: 0.2s; }
.loading-dot:nth-child(3) { -webkit-animation-delay: 0.4s; animation-delay: 0.4s; }
@-webkit-keyframes blink { 0%,80%,100%{opacity:0.15} 40%{opacity:1} }
@keyframes blink { 0%,80%,100%{opacity:0.15} 40%{opacity:1} }

.error-msg { text-align: center; padding: 30px 20px; color: #ef4444; font-size: 14px; }
.refresh-btn { display: block; margin: 4px auto 16px; padding: 9px 28px; background: none; border: 1px solid #1a2640; border-radius: 20px; color: #7eb8f7; font-size: 13px; cursor: pointer; -webkit-tap-highlight-color: transparent; }

.c-hot { color: #f97316; } .c-warm { color: #fbbf24; } .c-mild { color: #34d399; } .c-cold { color: #60a5fa; } .c-freeze { color: #a78bfa; }
.ctrl-btn { padding:8px 14px;background:#0d1828;border:1px solid #1e3a5f;border-radius:8px;color:#7eb8f7;font-size:13px;cursor:pointer;-webkit-tap-highlight-color:transparent; }
</style>
</head>
<body>

<div class="header">
  <h1>Estacion Meteorologica &nbsp;<span style="font-size:10px;color:#60a5fa;background:#0a1e35;padding:2px 8px;border-radius:10px;font-weight:600;letter-spacing:0.5px;border:1px solid #1e3a5f">ECMWF</span></h1>
  <div class="update-time" id="last-update">--:--</div>
</div>

<div class="location-tabs">
  <button class="tab-btn active" onclick="switchTab(0)">Tristan Suarez</button>
  <button class="tab-btn" onclick="switchTab(1)">Capital Federal</button>
  <button class="tab-btn" onclick="switchTab(2)">&#127783; Radar</button>
</div>

<div class="content">

  </div>
  <div id="section-2" class="section">
    <div id="radar-wrap">
      <div id="radar-status" style="font-size:12px;color:#4b5f7a;text-align:center;padding:8px 0 6px;">Cargando radar...</div>
      <div id="mapid" style="width:100%;height:340px;border-radius:12px;overflow:hidden;border:1px solid #1a2640;"></div>
      <div style="margin-top:10px;display:-webkit-box;display:-webkit-flex;display:flex;gap:8px;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;">
        <button class="ctrl-btn" onclick="radarPrev()">&#9664; Anterior</button>
        <button class="ctrl-btn" id="play-btn" onclick="radarToggle()">&#9654; Play</button>
        <button class="ctrl-btn" onclick="radarNext()">Siguiente &#9654;</button>
      </div>
      <div id="radar-time" style="text-align:center;font-size:12px;color:#6b7280;margin-top:8px;height:16px;"></div>

        <div style="font-size:11px;color:#4b5f7a;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;">Intensidad de lluvia (dBZ)</div>
        <div style="display:-webkit-box;display:-webkit-flex;display:flex;gap:4px;-webkit-align-items:center;align-items:center;">
          <div style="width:28px;height:12px;background:#00d8ff;border-radius:2px;"></div><span style="font-size:10px;color:#9ca3af;margin-right:6px;">Llovizna</span>
          <div style="width:28px;height:12px;background:#00b400;border-radius:2px;"></div><span style="font-size:10px;color:#9ca3af;margin-right:6px;">Leve</span>
          <div style="width:28px;height:12px;background:#ffff00;border-radius:2px;"></div><span style="font-size:10px;color:#9ca3af;margin-right:6px;">Moderada</span>
          <div style="width:28px;height:12px;background:#ff6600;border-radius:2px;"></div><span style="font-size:10px;color:#9ca3af;margin-right:6px;">Intensa</span>
          <div style="width:28px;height:12px;background:#ff0000;border-radius:2px;"></div><span style="font-size:10px;color:#9ca3af;margin-right:6px;">Severa</span>
          <div style="width:28px;height:12px;background:#ff00ff;border-radius:2px;"></div><span style="font-size:10px;color:#9ca3af;">Granizo</span>
        </div>
      </div>
      <div style="margin-top:8px;font-size:10px;color:#374151;text-align:center;">Fuente: RainViewer &bull; Datos radar global &bull; Se actualiza cada 10 min</div>
    </div>
  </div>
</div>

  var d=new Date(s);

    +'<line x1="30" y1="6" x2="30" y2="54" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>'
    +'<line x1="6" y1="30" x2="54" y2="30" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>'
    +'<line x1="14" y1="14" x2="46" y2="46" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>'
    +'<line x1="46" y1="14" x2="14" y2="46" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>'
    +'<circle cx="30" cy="30" r="5" fill="#a78bfa"/>'
    +'<circle cx="30" cy="10" r="3.5" fill="#a78bfa"/>'
    +'<circle cx="30" cy="50" r="3.5" fill="#a78bfa"/>'
    +'<circle cx="10" cy="30" r="3.5" fill="#a78bfa"/>'

    +'</svg>';
}

    +'<line x1="4" y1="44" x2="56" y2="44" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>'
    +'<path d="M10 44 Q10 28 30 28 Q50 28 50 44" fill="none" stroke="#fbbf24" stroke-width="2.2" stroke-linecap="round"/>'
    +'<line x1="30" y1="10" x2="30" y2="18" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>'
    +'<line x1="10" y1="18" x2="15" y2="22" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>'
    +'<line x1="50" y1="18" x2="45" y2="22" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>'
    +'<polyline points="23,52 30,44 37,52" stroke="#fbbf24" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>'
    +'</svg>';
}
function iSunSet(){
  return '<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">'
    +'<line x1="4" y1="44" x2="56" y2="44" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>'
    +'<path d="M10 44 Q10 28 30 28 Q50 28 50 44" fill="none" stroke="#f97316" stroke-width="2.2" stroke-linecap="round"/>'
    +'<line x1="30" y1="10" x2="30" y2="18" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>'
    +'<line x1="10" y1="18" x2="15" y2="22" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>'
    +'<line x1="50" y1="18" x2="45" y2="22" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>'
    +'<polyline points="23,44 30,52 37,44" stroke="#f97316" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>'

}
function iHumidity(){
  return '<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">'
    +'<path d="M20 5 Q20 5 9 22 Q5 28 5 32 Q5 39 20 39 Q35 39 35 32 Q35 28 31 22 Z" fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-linejoin="round"/>'
    +'<path d="M20 12 Q13 22 11 28 Q11 34 20 34" stroke="#7dd3fc" stroke-width="1.5" fill="none" stroke-linecap="round"/>'

function iWind(){
  return '<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">'
    +'<path d="M3 15 Q15 15 19 11 Q23 7 21 5 Q17 1 15 7" stroke="#94a3b8" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>'
    +'<line x1="3" y1="21" x2="32" y2="21" stroke="#94a3b8" stroke-width="2.2" stroke-linecap="round"/>'
    +'<path d="M3 27 Q13 27 17 31 Q21 35 19 37 Q15 41 13 35" stroke="#94a3b8" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>'
    +'</svg>';
}
function iPressure(){
  return '<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">'
    +'<circle cx="20" cy="21" r="16" fill="none" stroke="#334155" stroke-width="2"/>'
    +'<path d="M7 30 A14 14 0 1 1 33 30" fill="none" stroke="#475569" stroke-width="2.5" stroke-linecap="round"/>'
    +'<line x1="20" y1="21" x2="29" y2="14" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>'

    +'<line x1="31" y1="30" x2="27" y2="30" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>'
    +'</svg>';
}
function iRainDrop(){
  return '<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">'
    +'<path d="M20 4 Q20 4 9 21 Q5 27 5 31 Q5 38 20 38 Q35 38 35 31 Q35 27 31 21 Z" fill="#2563eb"/>'
    +'<path d="M20 11 Q13 21 11 27 Q11 33 20 33" stroke="#60a5fa" stroke-width="1.5" fill="none" stroke-linecap="round"/>'
    +'</svg>';

function iRainTiny(){
  return '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">'
    +'<path d="M3 11 Q3 6 8 6 Q9 3 13 3 Q18 0 20 5 Q24 5 24 10 Q24 13 20 13 L4 13 Z" fill="#475569"/>'
    +'<line x1="6" y1="16" x2="4" y2="21" stroke="#60a5fa" stroke-width="1.8" stroke-linecap="round"/>'
    +'<line x1="12" y1="16" x2="10" y2="21" stroke="#60a5fa" stroke-width="1.8" stroke-linecap="round"/>'
    +'<line x1="18" y1="16" x2="16" y2="21" stroke="#60a5fa" stroke-width="1.8" stroke-linecap="round"/>'
    +'</svg>';
}

function getIcon(code){
  var c=parseInt(code);
  if(c===0||c===1) return iSun();
  if(c===2) return iSunCloud();
  if(c===3) return iCloud();
  if(c===45||c===48) return iFog();
  if(c>=51&&c<=55) return iDrizzle();
  if(c===61||c===80) return iRainLight();
  if(c===63||c===81) return iRain();
  if(c===65||c===82) return iRainHeavy();
  if(c>=71&&c<=75||c===85||c===86) return iSnow();
  if(c===77) return iHail();
  if(c>=95) return iStorm();
  return iCloud();
}

function fetchWeather(idx){
  var loc=LOCATIONS[idx];
  var url="https://api.open-meteo.com/v1/forecast"
    +"?latitude="+loc.lat+"&longitude="+loc.lon
    +"&current=temperature_2m,apparent_temperature,relative_humidity_2m,precipitation,weather_code,wind_speed_10m,wind_direction_10m,surface_pressure"
    +"&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_sum,precipitation_probability_max"
    +"&timezone=America%2FArgentina%2FBuenos_Aires"
    +"&forecast_days=7&past_days=3"
    +"&models=ecmwf_ifs025";
  var xhr=new XMLHttpRequest();
  xhr.open("GET",url,true);
  xhr.onreadystatechange=function(){
    if(xhr.readyState===4){
      if(xhr.status===200){
        try{ var d=JSON.parse(xhr.responseText); loaded[idx]=true; renderWeather(idx,d); }
        catch(e){ showError(idx,"Error al procesar datos."); }
      } else { showError(idx,"Sin conexion. Verificar internet."); }
    }
  };
  xhr.send();
}

function showError(idx,msg){
  document.getElementById("loading-"+idx).style.display="none";
  document.getElementById("error-"+idx).style.display="block";
  document.getElementById("error-"+idx).innerHTML=msg+'<br><br><button class="refresh-btn" onclick="retryLoad('+idx+')">Reintentar</button>';
}
function retryLoad(idx){
  loaded[idx]=false;
  document.getElementById("error-"+idx).style.display="none";
  document.getElementById("loading-"+idx).style.display="block";
  fetchWeather(idx);
}

function renderWeather(idx,data){
  document.getElementById("loading-"+idx).style.display="none";
  var c=data.current, daily=data.daily;
  var temp=Math.round(c.temperature_2m);
  var feels=Math.round(c.apparent_temperature);
  var desc=WMO_CODES[c.weather_code]||"Desconocido";
  var hum=Math.round(c.relative_humidity_2m);
  var wind=Math.round(c.wind_speed_10m);
  var wdir=windDir(c.wind_direction_10m);
  var pressure=Math.round(c.surface_pressure);
  var sunrise0=daily.sunrise[3], sunset0=daily.sunset[3];
  var dMax=Math.round(daily.temperature_2m_max[3]);
  var dMin=Math.round(daily.temperature_2m_min[3]);

  var hasFrost=false, frostDays=[];
  for(var i=3;i<daily.temperature_2m_min.length;i++){
    if(daily.temperature_2m_min[i]<=0){ hasFrost=true; frostDays.push(getDayLabel(daily.time[i],i-3)+" ("+daily.temperature_2m_min[i]+"°C)"); }
  }
  var rain7=0; for(var j=3;j<daily.precipitation_sum.length;j++) rain7+=(daily.precipitation_sum[j]||0);
  var rain3=0; for(var k=0;k<3;k++) rain3+=(daily.precipitation_sum[k]||0);
  var rainToday=daily.precipitation_sum[3]||0;
  var rainYest=daily.precipitation_sum[2]||0;
  var maxRain=Math.max(rain7,rain3,rainToday,rainYest,1);

  var frostHtml="";
  if(hasFrost){
    frostHtml='<div class="frost-alert show">'+iFrost()
      +'<div><div class="frost-title">Alerta de Helada</div>'
      +'<div class="frost-text">'+frostDays.join(" | ")+'</div></div></div>';
  }

  var forecastHtml="";
  for(var d=3;d<Math.min(daily.time.length,10);d++){
    var fl=getDayLabel(daily.time[d],d-3);
    var fm=Math.round(daily.temperature_2m_max[d]);
    var fn=Math.round(daily.temperature_2m_min[d]);
    var fdesc=WMO_CODES[daily.weather_code[d]]||"";
    var frain=(daily.precipitation_sum[d]||0).toFixed(1);
    var fprob=daily.precipitation_probability_max[d]||0;
    var ftag=fn<=0?'<span class="frost-tag">HELADA</span>':"";
    forecastHtml+='<div class="forecast-row">'
      +'<div class="forecast-day">'+fl+'</div>'
      +'<div class="forecast-icon">'+getIcon(daily.weather_code[d])+'</div>'
      +'<div class="forecast-info"><div class="forecast-desc-text">'+fdesc+'</div><div class="forecast-rain-info">'+frain+'mm &bull; '+fprob+'%</div>'+ftag+'</div>'
      +'<div class="forecast-temps"><div class="f-max '+tempClass(fm)+'">'+fm+'°</div><div class="f-min">'+fn+'°</div></div>'
      +'</div>';
  }

  var html=
    '<div class="main-card">'
    +'<div class="weather-icon-wrap">'+getIcon(c.weather_code)+'</div>'
    +'<div class="main-temp '+tempClass(temp)+'">'+temp+'<sup>°C</sup></div>'
    +'<div class="weather-desc">'+desc+'</div>'
    +'<div class="feels-row">Sensacion termica: '+feels+'°C</div>'
    +'<div class="minmax-row"><span class="mx">Max '+dMax+'°</span>&nbsp;&nbsp;&nbsp;<span class="mn">Min '+dMin+'°</span></div>'
    +'</div>'
    +frostHtml
    +'<div class="sun-card">'
    +'<div class="sun-item"><div class="sun-label">Salida del sol</div>'+iSunRise()+'<div class="sun-time">'+formatTime(sunrise0)+'</div></div>'
    +'<div class="sun-divider"></div>'
    +'<div class="sun-item"><div class="sun-label">Puesta del sol</div>'+iSunSet()+'<div class="sun-time">'+formatTime(sunset0)+'</div></div>'
    +'</div>'
    +'<div class="grid-4">'
    +'<div class="mini-card">'+iHumidity()+'<div class="mini-card-text"><div class="card-label">Humedad</div><div class="card-value">'+hum+'<span class="card-unit">%</span></div></div></div>'
    +'<div class="mini-card">'+iWind()+'<div class="mini-card-text"><div class="card-label">Viento</div><div class="card-value">'+wind+'<span class="card-unit"> km/h</span></div><div class="card-sub">'+wdir+'</div></div></div>'
    +'<div class="mini-card">'+iPressure()+'<div class="mini-card-text"><div class="card-label">Presion</div><div class="card-value">'+pressure+'<span class="card-unit"> hPa</span></div></div></div>'
    +'<div class="mini-card">'+iRainDrop()+'<div class="mini-card-text"><div class="card-label">Lluvia hoy</div><div class="card-value">'+rainToday.toFixed(1)+'<span class="card-unit"> mm</span></div></div></div>'
    +'</div>'
    +'<div class="section-title">Lluvia acumulada</div>'
    +'<div class="rain-card">'
    +'<div class="rain-row"><div class="rain-icon">'+iRainTiny()+'</div><div class="rain-period">Hoy</div><div class="rain-bar-wrap"><div class="rain-bar" style="width:'+Math.round(rainToday/maxRain*100)+'%"></div></div><div class="rain-mm">'+rainToday.toFixed(1)+' mm</div></div>'
    +'<div class="rain-row"><div class="rain-icon">'+iRainTiny()+'</div><div class="rain-period">Ayer</div><div class="rain-bar-wrap"><div class="rain-bar" style="width:'+Math.round(rainYest/maxRain*100)+'%"></div></div><div class="rain-mm">'+rainYest.toFixed(1)+' mm</div></div>'
    +'<div class="rain-row"><div class="rain-icon">'+iRainTiny()+'</div><div class="rain-period">Ultimos 3 dias</div><div class="rain-bar-wrap"><div class="rain-bar" style="width:'+Math.round(rain3/maxRain*100)+'%"></div></div><div class="rain-mm">'+rain3.toFixed(1)+' mm</div></div>'
    +'<div class="rain-row"><div class="rain-icon">'+iRainTiny()+'</div><div class="rain-period">Proximos 7 dias</div><div class="rain-bar-wrap"><div class="rain-bar" style="width:'+Math.round(rain7/maxRain*100)+'%"></div></div><div class="rain-mm">'+rain7.toFixed(1)+' mm</div></div>'
    +'</div>'
    +'<div class="section-title">Pronostico 7 dias</div>'
    +'<div class="forecast-card">'+forecastHtml+'</div>'
    +'<button class="refresh-btn" onclick="refreshData('+idx+')">&#8635; Actualizar</button>';

  var cont=document.getElementById("data-"+idx);
  cont.innerHTML=html;
  cont.style.display="block";
  var now=new Date();
  document.getElementById("last-update").innerHTML="Act: "+pad(now.getHours())+":"+pad(now.getMinutes());
}

function refreshData(idx){
  document.getElementById("data-"+idx).style.display="none";
  document.getElementById("loading-"+idx).style.display="block";
  loaded[idx]=false;
  fetchWeather(idx);
}

fetchWeather(0);
setInterval(function(){ if(loaded[0])refreshData(0); if(loaded[1])refreshData(1); },30*60*1000);
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
var radarMap = null;
var radarFrames = [];
var radarPos = 0;
var radarTimer = null;
var radarPlaying = false;
var radarLayers = {};
var radarApiData = null;
var radarInited = false;

function initRadar(){
  if(radarInited) return;
  radarInited = true;
  radarMap = L.map('mapid', {
    center: [-34.78, -58.57],
    zoom: 8,
    zoomControl: true,
    attributionControl: false
  });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 12,
    attribution: ''
  }).addTo(radarMap);

  L.circleMarker([-34.89, -58.57], {
    radius: 7, color: '#3b82f6', fillColor: '#3b82f6', fillOpacity: 0.9, weight: 2
  }).bindTooltip('Tristan Suarez', {permanent: false, direction: 'right'}).addTo(radarMap);

  L.circleMarker([-34.6037, -58.3816], {
    radius: 6, color: '#f97316', fillColor: '#f97316', fillOpacity: 0.9, weight: 2
  }).bindTooltip('Capital Federal', {permanent: false, direction: 'right'}).addTo(radarMap);

  loadRadarData();
  setInterval(loadRadarData, 10 * 60 * 1000);
}

function loadRadarData(){
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'https://api.rainviewer.com/public/weather-maps.json', true);
  xhr.onreadystatechange = function(){
    if(xhr.readyState === 4 && xhr.status === 200){
      try {
        radarApiData = JSON.parse(xhr.responseText);
        var past = radarApiData.radar.past || [];
        var nowcast = radarApiData.radar.nowcast || [];
        radarFrames = past.concat(nowcast);
        radarLayers = {};
        document.getElementById('radar-status').innerHTML =
          'Radar en tiempo real &bull; ' + radarFrames.length + ' fotogramas (2h pasado + 30min futuro)';
        if(!radarPlaying){
          radarPos = past.length - 1;
          showRadarFrame(radarPos);
        }
      } catch(e){
        document.getElementById('radar-status').innerHTML = 'Error al cargar radar.';
      }
    }
  };
  xhr.send();
}

function getRadarLayer(frame){
  var key = frame.path;
  if(!radarLayers[key]){
    var url = radarApiData.host + frame.path + '/256/{z}/{x}/{y}/2/1_1.png';
    radarLayers[key] = L.tileLayer(url, { opacity: 0.75, maxZoom: 12 });
  }
  return radarLayers[key];
}

function showRadarFrame(pos){
  if(!radarFrames.length || !radarApiData) return;
  pos = Math.max(0, Math.min(pos, radarFrames.length - 1));
  radarPos = pos;
  var frame = radarFrames[pos];

  Object.keys(radarLayers).forEach(function(k){
    if(radarMap.hasLayer(radarLayers[k])) radarMap.removeLayer(radarLayers[k]);
  });
  getRadarLayer(frame).addTo(radarMap);

  var d = new Date(frame.time * 1000);
  var label = pad(d.getDate()) + '/' + pad(d.getMonth()+1) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  var isPast = radarApiData.radar.past && radarPos < radarApiData.radar.past.length;
  var tag = isPast ? '' : ' <span style="color:#34d399;font-weight:600">[PROX]</span>';
  document.getElementById('radar-time').innerHTML = label + tag;
}

function radarNext(){
  if(radarPos < radarFrames.length - 1){ radarPos++; showRadarFrame(radarPos); }
}
function radarPrev(){
  if(radarPos > 0){ radarPos--; showRadarFrame(radarPos); }
}
function radarToggle(){
  if(radarPlaying){
    clearInterval(radarTimer);
    radarPlaying = false;
    document.getElementById('play-btn').innerHTML = '&#9654; Play';
  } else {
    radarPlaying = true;
    document.getElementById('play-btn').innerHTML = '&#9646;&#9646; Pausa';
    radarTimer = setInterval(function(){
      radarPos++;
      if(radarPos >= radarFrames.length) radarPos = 0;
      showRadarFrame(radarPos);
    }, 600);
  }
}

function switchTab(idx){
  var tabs=document.querySelectorAll(".tab-btn");
  var sects=document.querySelectorAll(".section");
  for(var i=0;i<tabs.length;i++){
    tabs[i].className=i===idx?"tab-btn active":"tab-btn";
    sects[i].className=i===idx?"section active":"section";
  }
  currentTab=idx;
  if(idx===2){
    setTimeout(function(){
      initRadar();
      if(radarMap) radarMap.invalidateSize();
    }, 100);
  } else {
    if(!loaded[idx]) fetchWeather(idx);
  }
}
</script>
</body>
</html>
