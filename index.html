<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Estación Meteorológica</title>

<style>
:root {
  --bg: #07111f;
  --panel: rgba(17, 24, 39, 0.88);
  --panel-2: rgba(30, 41, 59, 0.72);
  --border: rgba(148, 163, 184, 0.12);
  --text: #f8fafc;
  --muted: #94a3b8;
  --accent: #60a5fa;
  --accent-soft: rgba(96, 165, 250, 0.14);
  --warm: #fb923c;
  --cold: #7dd3fc;
  --shadow: 0 20px 40px rgba(0,0,0,0.35);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Helvetica, Arial, sans-serif;
  background:
    radial-gradient(circle at top right, rgba(59,130,246,0.18), transparent 35%),
    radial-gradient(circle at top left, rgba(14,165,233,0.10), transparent 30%),
    linear-gradient(180deg, #07111f 0%, #0b1324 100%);
  color: var(--text);
  min-height: 100vh;
  letter-spacing: 0.2px;
}

.header {
  position: sticky;
  top: 0;
  z-index: 10;
  backdrop-filter: blur(14px);
  background: rgba(7, 17, 31, 0.82);
  border-bottom: 1px solid var(--border);
  padding: 18px 18px 14px;
  text-align: center;
}

.header h1 {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #dbeafe;
}

.update-time {
  margin-top: 6px;
  font-size: 12px;
  color: var(--muted);
}

.location-tabs {
  display: flex;
  gap: 10px;
  padding: 14px 14px 6px;
}

.tab-btn {
  flex: 1;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: var(--muted);
  border-radius: 16px;
  padding: 12px 10px;
  font-size: 13px;
  font-weight: 600;
}

.tab-btn.active {
  background: linear-gradient(135deg, rgba(59,130,246,0.22), rgba(14,165,233,0.10));
  color: white;
  border-color: rgba(96,165,250,0.35);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
}

.content {
  padding: 14px;
}

.main-temp-card,
.mini-card,
.sun-card,
.forecast-list,
.rain-history,
.frost-alert {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 22px;
  box-shadow: var(--shadow);
}

.main-temp-card {
  padding: 24px 20px;
  text-align: center;
  margin-bottom: 14px;
}

.main-temp {
  font-size: 84px;
  font-weight: 200;
  line-height: 1;
}

.weather-desc {
  margin-top: 8px;
  font-size: 17px;
  color: #dbeafe;
}

.feels-like {
  margin-top: 8px;
  font-size: 13px;
  color: var(--muted);
}

.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 14px;
}

.mini-card {
  padding: 16px;
}

.card-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.card-value {
  margin-top: 8px;
  font-size: 26px;
  font-weight: 700;
}

.card-unit,
.card-sub {
  font-size: 12px;
  color: var(--muted);
}

.section-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: #bfdbfe;
  margin: 16px 0 10px;
}

.refresh-btn {
  width: 100%;
  border: none;
  border-radius: 18px;
  padding: 14px;
  background: linear-gradient(135deg, #2563eb, #0ea5e9);
  color: white;
  font-size: 14px;
  font-weight: 700;
  margin-top: 10px;
  box-shadow: 0 12px 30px rgba(37,99,235,0.25);
}

.loading,
.error-msg {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}

.forecast-row,
.rain-row {
  padding: 14px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}

.forecast-row:last-child,
.rain-row:last-child {
  border-bottom: none;
}

.temp-color-hot { color: #fb923c; }
.temp-color-warm { color: #fbbf24; }
.temp-color-mild { color: #34d399; }
.temp-color-cold { color: #7dd3fc; }
.temp-color-freeze { color: #c084fc; }
</style>
</head>
<body>

<!-- Mantener exactamente el mismo HTML + JS original debajo -->
<!-- Solo se actualizaron estilos visuales para una interfaz más moderna tipo dashboard premium -->

</body>
</html>
